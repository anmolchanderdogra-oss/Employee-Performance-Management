<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - EmployeeLC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-users-cog"></i></div>
                <h2>EmployeeLC</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
                <a href="employees.html" class="nav-item active"><i class="fas fa-user-tie"></i><span>Employees</span></a>
                <a href="departments.html" class="nav-item"><i class="fas fa-building"></i><span>Departments</span></a>
                <a href="performance.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Performance</span></a>
                <a href="attendance.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Attendance</span></a>
                <a href="session-info.html" class="nav-item"><i class="fas fa-stopwatch"></i><span>Session Info</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Employees</h1>
                    <nav aria-label="breadcrumb"><ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="dashboard.html">Home</a></li>
                        <li class="breadcrumb-item active">Employees</li>
                    </ol></nav>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-avatar"><i class="fas fa-user"></i></div>
                        <div class="user-info"><span class="user-name">Admin</span><span class="user-role">Administrator</span></div>
                        <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="page-header">
                    <h2><i class="fas fa-user-tie"></i> Employee Management</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#employeeModal">
                        <i class="fas fa-plus"></i> Add Employee
                    </button>
                </div>

                <!-- Search -->
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                                    <input type="text" id="searchInput" class="form-control"
                                           placeholder="Search by name or email...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <select id="deptFilter" class="form-control">
                                    <option value="">All Departments</option>
                                    <option value="1">Engineering</option>
                                    <option value="2">Human Resources</option>
                                    <option value="3">Marketing</option>
                                    <option value="4">Finance</option>
                                    <option value="5">Operations</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button onclick="searchEmployees()" class="btn btn-primary w-100">
                                    <i class="fas fa-filter"></i> Filter
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Employee Table -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-list"></i> Employee List</h3>
                        <span class="badge bg-primary" id="employeeCount">8 employees</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th><i class="fas fa-user"></i> Employee</th>
                                        <th><i class="fas fa-envelope"></i> Email</th>
                                        <th><i class="fas fa-building"></i> Department</th>
                                        <th><i class="fas fa-briefcase"></i> Designation</th>
                                        <th><i class="fas fa-calendar"></i> Joined</th>
                                        <th><i class="fas fa-toggle-on"></i> Status</th>
                                        <th><i class="fas fa-cog"></i> Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="employeeTableBody">
                                    <!-- Data loaded dynamically -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div class="modal fade" id="employeeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-plus"></i> Add Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="employeeForm">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">First Name *</label>
                                    <input type="text" name="firstName" class="form-control" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Last Name *</label>
                                    <input type="text" name="lastName" class="form-control" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Email *</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Phone</label>
                                    <input type="tel" name="phone" class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Date of Birth</label>
                                    <input type="date" name="dateOfBirth" class="form-control">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Date of Joining *</label>
                                    <input type="date" name="dateOfJoining" class="form-control" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Department</label>
                                    <select name="departmentId" class="form-control">
                                        <option value="">-- Select --</option>
                                        <option value="1">Engineering</option>
                                        <option value="2">Human Resources</option>
                                        <option value="3">Marketing</option>
                                        <option value="4">Finance</option>
                                        <option value="5">Operations</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Designation</label>
                                    <input type="text" name="designation" class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-control">
                                <option value="ACTIVE">Active</option>
                                <option value="ON_LEAVE">On Leave</option>
                                <option value="TERMINATED">Terminated</option>
                                <option value="RETIRED">Retired</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        checkAuth();

        // Sample employee data
        const employees = [
            { id: 1, firstName: 'John', lastName: 'Smith', email: 'john.smith@company.com', department: 'Engineering', designation: 'Senior Software Engineer', dateOfJoining: '2020-01-15', status: 'ACTIVE' },
            { id: 2, firstName: 'Sarah', lastName: 'Johnson', email: 'sarah.johnson@company.com', department: 'Engineering', designation: 'Tech Lead', dateOfJoining: '2019-06-01', status: 'ACTIVE' },
            { id: 3, firstName: 'Michael', lastName: 'Williams', email: 'michael.williams@company.com', department: 'Human Resources', designation: 'HR Manager', dateOfJoining: '2021-03-10', status: 'ACTIVE' },
            { id: 4, firstName: 'Emily', lastName: 'Brown', email: 'emily.brown@company.com', department: 'Marketing', designation: 'Marketing Director', dateOfJoining: '2020-09-01', status: 'ACTIVE' },
            { id: 5, firstName: 'David', lastName: 'Jones', email: 'david.jones@company.com', department: 'Finance', designation: 'Finance Manager', dateOfJoining: '2018-04-15', status: 'ACTIVE' },
            { id: 6, firstName: 'Jessica', lastName: 'Garcia', email: 'jessica.garcia@company.com', department: 'Engineering', designation: 'Software Engineer', dateOfJoining: '2022-01-10', status: 'ACTIVE' },
            { id: 7, firstName: 'Robert', lastName: 'Martinez', email: 'robert.martinez@company.com', department: 'Operations', designation: 'Operations Manager', dateOfJoining: '2021-07-20', status: 'ACTIVE' },
            { id: 8, firstName: 'Amanda', lastName: 'Davis', email: 'amanda.davis@company.com', department: 'Human Resources', designation: 'HR Specialist', dateOfJoining: '2020-11-05', status: 'ON_LEAVE' }
        ];

        function renderEmployees(data) {
            const tbody = document.getElementById('employeeTableBody');
            document.getElementById('employeeCount').textContent = data.length + ' employees';

            tbody.innerHTML = data.map(emp => `
                <tr>
                    <td>
                        <div class="employee-cell">
                            <div class="emp-avatar">${emp.firstName.charAt(0)}${emp.lastName.charAt(0)}</div>
                            <div><strong>${emp.firstName} ${emp.lastName}</strong><small>EMP${String(emp.id).padStart(5, '0')}</small></div>
                        </div>
                    </td>
                    <td>${emp.email}</td>
                    <td>${emp.department}</td>
                    <td>${emp.designation}</td>
                    <td>${new Date(emp.dateOfJoining).toLocaleDateString()}</td>
                    <td><span class="badge ${emp.status === 'ACTIVE' ? 'bg-success' : emp.status === 'ON_LEAVE' ? 'bg-warning' : 'bg-secondary'}">${emp.status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="viewEmployee(${emp.id})"><i class="fas fa-eye"></i></button>
                        <button class="btn btn-sm btn-primary" onclick="editEmployee(${emp.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${emp.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function searchEmployees() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const dept = document.getElementById('deptFilter').value;

            const filtered = employees.filter(emp => {
                const matchName = emp.firstName.toLowerCase().includes(query) ||
                                 emp.lastName.toLowerCase().includes(query) ||
                                 emp.email.toLowerCase().includes(query);
                const matchDept = !dept || emp.department.toLowerCase().includes(document.querySelector(`#deptFilter option[value="${dept}"]`).text);
                return matchName;
            });

            renderEmployees(filtered);
        }

        function viewEmployee(id) {
            alert('View employee details - ID: ' + id);
        }

        function editEmployee(id) {
            alert('Edit employee - ID: ' + id);
        }

        function deleteEmployee(id) {
            if (confirm('Are you sure you want to delete this employee?')) {
                alert('Employee deleted - ID: ' + id);
            }
        }

        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Employee saved successfully!');
            bootstrap.Modal.getInstance(document.getElementById('employeeModal')).hide();
        });

        // Initial render
        renderEmployees(employees);

        function logout() {
            localStorage.removeItem('employeeLC_session');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
